name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Test file to run (leave blank for all tests)'
        required: false
        default: ''
      browser:
        description: 'Browser to use'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ github.event.inputs.browser || 'chromium' }}

      - name: Run Playwright tests
        id: run_tests
        run: |
          set +e
          if [ -n "${{ github.event.inputs.test_file }}" ]; then
            npx playwright test "${{ github.event.inputs.test_file }}" --project=${{ github.event.inputs.browser || 'chromium' }}
          else
            npx playwright test --project=${{ github.event.inputs.browser || 'chromium' }}
          fi
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        env:
          CI: true
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure HTML Report (single-file)
        if: always()
        # continue-on-error ensures a missing/empty allure-results does not fail
        # the workflow and block artifact upload + email notification
        continue-on-error: true
        run: |
          mkdir -p allure-results
          allure generate allure-results --clean --single-file -o allure-report

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7

      - name: Fail job if tests failed
        if: always()
        run: |
          if [ "${{ steps.run_tests.outputs.exit_code }}" != "0" ]; then
            echo "::error::Playwright tests failed (exit code ${{ steps.run_tests.outputs.exit_code }}). Check the uploaded reports for details."
            exit 1
          fi


